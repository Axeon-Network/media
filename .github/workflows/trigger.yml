name: Trigger Main Repo

on:
  push:
    branches: [ main ]

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Notify main repo
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.MEDIA_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Axeon-Network/Kuro-EXP/dispatches \
            -d '{"event_type":"sync-media"}'
